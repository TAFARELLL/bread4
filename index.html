<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>COBRONA</title>

<style>
body {
  background: blue;
  color: white;
  text-align: center;
  font-family: Arial;
}

canvas {
  border: 2px solid white;
}
</style>
</head>

<body>

<h1>🐍 COBRONA</h1>
<p>Use as setas | R para reiniciar</p>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;

let snake, dx, dy, food, score, started, gameOverState;

// ✅ FUNÇÃO DE RESET (SEM RECARREGAR)
function resetGame() {
  snake = [{x: 10, y: 10}];
  dx = 0;
  dy = 0;
  food = { x: 5, y: 5 };
  score = 0;
  started = false;
  gameOverState = false;
}

resetGame();

// teclado
window.addEventListener("keydown", function(e) {

  // reiniciar
  if (e.key === "r" || e.key === "R") {
    resetGame();
    return;
  }

  if (gameOverState) return;

  if (!started) started = true;

  if (e.key === "ArrowUp" && dy === 0) {
    dx = 0; dy = -1;
  } else if (e.key === "ArrowDown" && dy === 0) {
    dx = 0; dy = 1;
  } else if (e.key === "ArrowLeft" && dx === 0) {
    dx = -1; dy = 0;
  } else if (e.key === "ArrowRight" && dx === 0) {
    dx = 1; dy = 0;
  }

});

// loop
function game() {

  if (!started && !gameOverState) {
    draw();
    return;
  }

  if (gameOverState) {
    draw();
    return;
  }

  const head = {
    x: snake[0].x + dx,
    y: snake[0].y + dy
  };

  // parede
  if (
    head.x < 0 || head.x > 19 ||
    head.y < 0 || head.y > 19
  ) {
    gameOverState = true;
  }

  // corpo
  for (let i = 1; i < snake.length; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y) {
      gameOverState = true;
    }
  }

  if (gameOverState) {
    draw();
    return;
  }

  snake.unshift(head);

  // comida
  if (head.x === food.x && head.y === food.y) {
    score++;
    food = {
      x: Math.floor(Math.random() * 20),
      y: Math.floor(Math.random() * 20)
    };
  } else {
    snake.pop();
  }

  draw();
}

// desenhar
function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, 400, 400);

  // cobra
  ctx.fillStyle = "lime";
  snake.forEach(p => {
    ctx.fillRect(p.x * grid, p.y * grid, grid, grid);
  });

  // comida
  ctx.fillStyle = "red";
  ctx.fillRect(food.x * grid, food.y * grid, grid, grid);

  // score
  ctx.fillStyle = "white";
  ctx.fillText("Pontos: " + score, 10, 20);

  // estado inicial
  if (!started && !gameOverState) {
    ctx.fillText("Pressione uma seta", 110, 200);
  }

  // GAME OVER BONITO ✅
  if (gameOverState) {
    ctx.fillStyle = "orange";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 130, 180);

    ctx.fillStyle = "white";
    ctx.font = "16px Arial";
    ctx.fillText("Pontos: " + score, 140, 210);
    ctx.fillText("Pressione R para reiniciar", 90, 240);
  }
}

setInterval(game, 120);
</script>

</body>
</html>
